apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: learning-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: learning-platform
data:
  default.conf: |
    server {
        listen 80;
        
        location /api/users/ {
            proxy_pass http://user-service:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/courses/ {
            proxy_pass http://course-service:3002/;
            proxy_set_header Host $host;
        }
        
        location /api/analytics/ {
            proxy_pass http://analytics-service:3003/;
            proxy_set_header Host $host;
        }
        
        location /api/ai/ {
            proxy_pass http://ai-tutor-service:3004/;
            proxy_set_header Host $host;
        }
        
        location /api/n8n/ {
            proxy_pass http://n8n-service:5678/;
            proxy_set_header Host $host;
        }
        
        location / {
            proxy_pass http://frontend-service/;
            proxy_set_header Host $host;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: learning-platform
spec:
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
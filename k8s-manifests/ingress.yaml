apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: learning-platform
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: learning.local  # À changer par votre domaine/IP
    http:
      paths:
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      - path: /api/courses
        pathType: Prefix
        backend:
          service:
            name: course-service
            port:
              number: 3002
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 3003
      - path: /api/ai
        pathType: Prefix
        backend:
          service:
            name: ai-tutor-service
            port:
              number: 3004
      - path: /api/n8n
        pathType: Prefix
        backend:
          service:
            name: n8n-service
            port:
              number: 5678
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
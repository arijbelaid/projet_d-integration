apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tutor-service
  namespace: learning-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-tutor-service
  template:
    metadata:
      labels:
        app: ai-tutor-service
    spec:
      containers:
      - name: ai-tutor-service
        image: ai-tutor-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-tutor-service
  namespace: learning-platform
spec:
  selector:
    app: ai-tutor-service
  ports:
  - port: 3004
    targetPort: 3004
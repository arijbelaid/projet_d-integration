apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: learning-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: analytics-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_HOST
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: learning-platform
spec:
  selector:
    app: analytics-service
  ports:
  - port: 3003
    targetPort: 3003
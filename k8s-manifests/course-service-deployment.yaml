apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: learning-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
      - name: course-service
        image: course-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MONGODB_URI
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  namespace: learning-platform
spec:
  selector:
    app: course-service
  ports:
  - port: 3002
    targetPort: 3002
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: learning-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user-service:latest  # Ou localhost:5000/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_HOST
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: learning-platform
spec:
  selector:
    app: user-service
  ports:
  - port: 3001
    targetPort: 3001